<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Редактируемый div</title>
  <style>
    #view, #editor {
      width: 300px;
      height: 100px;
      padding: 5px;
      border: 1px solid #ccc;
      box-sizing: border-box;
    }
  </style>
</head>
<body>

  <div id="view"></div>
  <textarea id="editor" hidden></textarea>

  <script>
    'use strict';

    const view = document.getElementById('view');
    const editor = document.getElementById('editor');

    const savedText = localStorage.getItem('editable_text');
    
    if (savedText) {
        view.innerText = savedText;
        editor.value = savedText;
    } else {
        view.innerText = 'Нажмите Ctrl+E для редактирования';
        editor.value = 'Нажмите Ctrl+E для редактирования';
    }

    document.addEventListener('keydown', action);

    function action(event) {

        if (event.code === 'KeyE' && (event.ctrlKey || event.metaKey)) {
            if (!editor.hidden) return; 
            
            event.preventDefault();
            editor.hidden = false;
            view.hidden = true;
            editor.focus(); 
            return;
        }

        if (event.code === 'KeyS' && (event.ctrlKey || event.metaKey)) {
            if (editor.hidden) return; 

            event.preventDefault();
            editor.hidden = true;
            view.hidden = false;
            
            view.innerText = editor.value;
            localStorage.setItem('editable_text', editor.value);
            return;
        }

        if (event.code === 'Escape') {
            if (editor.hidden) return;

            editor.hidden = true;
            view.hidden = false;
            editor.value = view.innerText;
            editor.blur(); // Убираем активный фокус с textarea
            return;
        }
    }
  </script>

</body>
</html>
