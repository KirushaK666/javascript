<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Модальное окно</title>
  <!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Форма</title>
 <style>
    body {
      background-color: #f4f5f6;
      font-family: system-ui, -apple-system, sans-serif;
    }

    #prompt-overlay {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(30, 30, 30, 0.35);
      backdrop-filter: blur(4px); /* размытие */
      z-index: 999;
    }
   
    #prompt-form-container {
      position: fixed;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      background: #ffffff; 
      padding: 24px; 
      border-radius: 12px; 
      box-shadow: 0 12px 32px rgba(0, 0, 0, 0.12), 0 4px 8px rgba(0, 0, 0, 0.06); 
      z-index: 1000;
      border: none; 
    }
  </style>

</head>
<body>

  <button id="start-btn">Запустить окно</button>

  <div id="prompt-overlay" hidden>
    <div id="prompt-form-container">
      <div id="prompt-message"></div>
      <input type="text" id="prompt-input"><br><br>
      <button id="prompt-ok">OK</button>
      <button id="prompt-cancel">ОТМЕНА</button>
    </div>
  </div>

  <script>
    'use strict';

    const overlay = document.getElementById('prompt-overlay');
    const msgDiv = document.getElementById('prompt-message');
    const input = document.getElementById('prompt-input');
    const okBtn = document.getElementById('prompt-ok');
    const cancelBtn = document.getElementById('prompt-cancel');

    function showPrompt(html, callback) {
      overlay.hidden = false;
      msgDiv.innerHTML = html; 
      
      input.value = ''; 
      input.focus();    

      function close() {
        overlay.hidden = true;
        okBtn.onclick = null;
        cancelBtn.onclick = null;
        document.onkeydown = null;
      }

      okBtn.onclick = function() {
        const val = input.value;
        close();
        callback(val);
      };

      cancelBtn.onclick = function() {
        close();
        callback(null);
      };

      document.onkeydown = function(event) {
        if (event.code === 'Escape') {
          close();
          callback(null);
        }

        if (event.code === 'Enter') {
          const val = input.value;
          close();
          callback(val);
        }

        if (event.code === 'Tab') {
          if (document.activeElement === cancelBtn && !event.shiftKey) {
            input.focus(); 
            event.preventDefault();
          }
          if (document.activeElement === input && event.shiftKey) {
            cancelBtn.focus(); 
            event.preventDefault();
          }
        }
      };
    }


    document.getElementById('start-btn').onclick = function() {
      showPrompt("Введите что-нибудь<br>... умное :)", function(value) {
        alert("Результат: " + value);
      });
    };
  </script>

</body>
</html>
