<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Плейсхолдер-подсказка</title>
  <style>
    .placeholder {
      color: #0000ff;
    }
  </style>
</head>
<body>

  <p id="hint" hidden></p>
  
  <input id="field" class="placeholder" data-placeholder="Введите что-нибудь">

  <script>
    'use strict';

    const field = document.getElementById('field');
    const hint = document.getElementById('hint');

    field.value = field.dataset.placeholder;

    field.addEventListener('focus', movePlaceholderUp);
    field.addEventListener('blur', movePlaceholderDown);

    function movePlaceholderUp() {
      if (field.value === field.dataset.placeholder) {
        field.value = '';
        field.classList.remove('placeholder');
      }

      hint.hidden = false;
      hint.innerText = field.dataset.placeholder + ':';
    }

    function movePlaceholderDown() {
      hint.hidden = true;

      if (field.value === '') {
        field.value = field.dataset.placeholder;
        field.classList.add('placeholder');
      }
    }
  </script>

</body>
</html>
