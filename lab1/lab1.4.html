<!DOCTYPE html>
<html lang="ru">
 <head>
  <meta charset="UTF-8">
  <title>Простые числа</title>
 </head>
 <body>

  <form id="f">
   <p>
    <label>
     Введите n:
     <input id="ninput" type="number" min="2" required>
    </label>
   </p>

   <p>
    <label>
     <textarea id="numbers" readonly></textarea>
    </label>
   </p>

   <input type="submit" value="Найти">
  </form>

  <script>
   'use strict';

   const form = document.getElementById('f');
   const nInput = document.getElementById('ninput');
   const numbersTextArea = document.getElementById('numbers');

   form.addEventListener('submit', primes);

   function primes(event) {
       event.preventDefault();

       let n = Number(nInput.value);
       numbersTextArea.value = '';

       let result = [];

       for (let i = 2; i <= n; i++) {
           let isPrime = true;

           for (let j = 2; j <= Math.sqrt(i); j++) {
               if (i % j === 0) {
                   isPrime = false;
                   break;
               }
           }

           if (isPrime) {
               result.push(i);
           }
       }

       numbersTextArea.value = result.join(' ');
   }
  </script>

 </body>
</html>
