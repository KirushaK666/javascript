<!DOCTYPE html>
<html lang="ru">
 <head>
  <meta charset="UTF-8">
  <title>Ввод числа</title>
 </head>
 <body>

  <a id="link" href="../index.html">Получить число</a>

  <script>
   'use strict';

   const link = document.getElementById('link');
   link.addEventListener('click', goToLink);

   function goToLink(event) {
       if (!getNumber()) {
           if (!confirm('Вы точно хотите перейти по ссылке без ввода числа?')) {
               event.preventDefault();
           }
       }
   }

   function getNumber() {
       while (true) {
           let x = prompt('Введите число, большее 100:');

           if (x === null) {
               return false; 
           }

           if (x.trim() === '') {
               alert('Вы ничего не ввели! Попробуйте еще раз.');
               continue; 
           }
           
           let num = Number(x);

           if (isNaN(num)) {
               alert('Вы ввели не число! Пожалуйста, введите цифры.');
               continue; 
           }
        
           if (num === 5267) {
               alert('Вы ввели уникальное число!'); 
               return true; 
           }
           if (num > 100) {
               return true; 
           }

           alert('Ошибка! Число должно быть БОЛЬШЕ 100!);
       }
   }
  </script>
 </body>
</html>
