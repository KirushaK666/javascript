<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Лабораторная работа №4: Объёкты, дата и время</title>
</head>
<body>

<script>
    'use strict';

    // =========================================================================
    // ОПРЕДЕЛЕНИЕ КЛАССА BOOK (Задания 1, 2, 3)
    // =========================================================================

    class Book {
        // Задание 2: Свойство price должно быть приватным
        #price;

        /**
         * Конструктор для создания объекта Книги
         * @param {string} title - Название
         * @param {number} pubYear - Год издания
         * @param {number} price - Стоимость
         */
        constructor(title, pubYear, price) {
            // Передаем значения через сеттеры для автоматического прохождения проверок
            this.title = title;
            this.pubYear = pubYear;
            this.price = price;
        }

        /**
         * Задание 1: Метод вывода названия и цены в консоль
         */
        show() {
            console.log(`Издание: "${this.title}" — Стоимость: ${this.price} руб.`);
        }

        // --- Задание 2: Геттеры и сеттеры с валидацией ---

        // Геттер и сеттер для title (открытое свойство, проверка на пустую строку)
        get title() {
            return this.innerTitle; 
        }

        set title(value) {
            if (typeof value === 'string' && value.trim() !== '') {
                this.innerTitle = value;
            } else {
                console.warn('Ошибка сеттера: Название не может быть пустой строкой!');
            }
        }

        // Геттер и сеттер для pubYear (свойство защищено нижним подчёркиванием по соглашению)
        get pubYear() {
            return this._pubYear; 
        }

        set pubYear(value) {
            if (typeof value === 'number' && value > 0) {
                this._pubYear = value;
            } else {
                console.warn('Ошибка сеттера: Год издания должен быть положительным числом!');
            }
        }

        // Геттер и сеттер для price (работает напрямую с приватным полем #price)
        get price() {
            return this.#price;
        }

        set price(value) {
            if (typeof value === 'number' && value > 0) {
                this.#price = value;
            } else {
                console.warn('Ошибка сеттера: Цена должна быть положительным числом!');
            }
        }

        // --- Задание 3: Статический метод сравнения по годам ---
        static compare(firstBook, secondBook) {
            return firstBook.pubYear - secondBook.pubYear;
        }
    }

    // =========================================================================
    // ТЕСТИРОВАНИЕ И ПРОВЕРКА РАБОТЫ КЛАССА
    // =========================================================================

    console.log("%c>>> Задание  1 <<<", "color: #e91e63; font-weight: bold;");
    // Создание экземпляра и вызов метода show (Популярная стартовая книга)
    const ourBook = new Book('Гарри Поттер и философский камень', 1997, 850);
    ourBook.show();


    console.log("\n%c>>> Задание 2 (Изменение свойств и валидация) <<<", "color: #e91e63; font-weight: bold;");
    // Попытка изменить значения свойств на корректные
    console.log("Установка валидных данных...");
    ourBook.title = 'Властелин колец';
    ourBook.pubYear = 1954;
    ourBook.price = 1200;
    ourBook.show();

    // Попытка передать некорректные данные для проверки сеттеров
    console.log("\nПередача некорректных данных (ожидаются предупреждения):");
    ourBook.title = '   ';    // Пустая строка после trim() -> ошибка
    ourBook.pubYear = -2024;  // Отрицательное число -> ошибка
    ourBook.price = 0;        // Ноль (не положительное) -> ошибка


    console.log("\n%c>>> Задание 3 (Сортировка массива) <<<", "color: #e91e63; font-weight: bold;");
    // Массив из трех экземпляров с известными мировыми шедеврами
    const books = [
        new Book('Гарри Поттер и Тайная комната', 1998, 890),
        new Book('Маленький принц', 1943, 450),
        new Book('1984', 1949, 390)
    ];

    console.log("Исходный порядок книг (по добавлению):");
    books.forEach(b => console.log(`[${b.pubYear} г.] ${b.title}`));

    // Сортировка с помощью статического метода Book.compare
    books.sort(Book.compare);

    console.log("\nПосле сортировки по году публикации (от старых к новым):");
    books.forEach(b => console.log(`[${b.pubYear} г.] — Книга: "${b.title}" (Цена: ${b.price} руб.)`));

        // =========================================================================
    // ЗАДАНИЕ 4: Проверка объекта на пустоту (isEmpty)
    // =========================================================================
    console.log("\n%c>>> Задание 4 (isEmpty) <<<", "color: #e91e63; font-weight: bold;");

    /**
     * Проверяет, нет ли у объекта абсолютно никаких свойств (включая скрытые и Symbol)
     */
    function isEmpty(targetObj) {
        // Получаем обычные/скрытые свойства и Symbol-ключи отдельными массивами
        const regularProps = Object.getOwnPropertyNames(targetObj);
        const symbolProps = Object.getOwnPropertySymbols(targetObj);
        
        // Объект пуст только если оба массива имеют нулевую длину
        return regularProps.length === 0 && symbolProps.length === 0;
    }

    // Тройное тестирование функции с разными кейсами
    console.log("Результат для {}:", isEmpty({})); 
    console.log("Результат для объекта с Symbol:", isEmpty({[Symbol('id')]: 100})); 

    // Тест со скрытым свойством через дескриптор
    let secureObject = {};
    Object.defineProperty(secureObject, 'hiddenKey', { value: 'secret', enumerable: false });
    console.log("Результат для объекта со скрытым полем:", isEmpty(secureObject)); 


    // =========================================================================
    // ЗАНИЕ 5: Управление классами (addClass / removeClass)
    // =========================================================================
    console.log("\n%c>>> Задание 5 (Классы строки) <<<", "color: #e91e63; font-weight: bold;");

    let elementNode = {
        className: 'open menu',

        addClass(newClass) {
            // Очищаем от лишних пробелов и разбиваем строку, если она не пустая
            let currentList = this.className ? this.className.trim().split(/\s+/) : [];
            
            // Если такого класса еще нет в массиве, добавляем его
            if (!currentList.includes(newClass)) {
                currentList.push(newClass);
                this.className = currentList.join(' ');
            }
            return this; // Возврат контекста для чейнинга (цепочки методов)
        },

        removeClass(targetClass) {
            if (!this.className) return this;

            // Фильтруем массив, оставляя только те элементы, которые не равны удаляемому
            this.className = this.className
                .split(/\s+/)
                .filter(item => item !== targetClass)
                .join(' ');

            return this;
        }
    };

    console.log(`Стартовое значение className: "${elementNode.className}"`);
    console.log(`Добавление 'navigation': "${elementNode.addClass('navigation').className}"`);
    console.log(`Повтор добавления 'navigation': "${elementNode.addClass('navigation').className}"`);
    console.log(`Удаление класса 'menu': "${elementNode.removeClass('menu').className}"`);


    // =========================================================================
    // ЗАДАНИЕ 6: Взаимодействие с форматом JSON
    // =========================================================================
    console.log("\n%c>>> Задание 6 (JSON операции) <<<", "color: #e91e63; font-weight: bold;");

    // Преобразование в JSON-строку с красивым форматированием (отступ 4 пробела)
    const convertedJson = JSON.stringify(elementNode, null, 4);
    console.log("Полученная JSON строка:\n" + convertedJson);

    // Восстановление объекта из строки обратно в память
    const parsedCopy = JSON.parse(convertedJson);

    // Верификация идентичности данных объектов через их строковые слепки
    const isMatched = JSON.stringify(elementNode) === JSON.stringify(parsedCopy);
    if (isMatched) {
        console.log('Статус: восстановленный объект полностью идентичен исходному.');
    } else {
        console.log('Статус: обнаружены расхождения в структурах объектов.');
    }


    // =========================================================================
    // ЗАДАНИЕ 7: Подсчет секунд, прошедших с полуночи
    // =========================================================================
    console.log("\n%c>>> Задание 7 (getSecondsToday) <<<", "color: #e91e63; font-weight: bold;");

    function getSecondsToday() {
        const currentTime = new Date();
        
        // Альтернативный метод: берем остаток от деления текущего времени 
        // (в мс) на количество миллисекунд в одних полных сутках (86400000)
        const millisecondsInDay = 24 * 60 * 60 * 1000;
        const msPassed = (currentTime.getTime() - currentTime.getTimezoneOffset() * 60 * 1000) % millisecondsInDay;
        
        return Math.floor(msPassed / 1000);
    }

    console.log(`Количество секунд от начала суток: ${getSecondsToday()}`);


    // =========================================================================
    // ЗАДАНИЕ 8: Кастомное форматирование даты
    // =========================================================================
    console.log("\n%c>>> Задание 8 (formatDate) <<<", "color: #e91e63; font-weight: bold;");

    /**
     * Преобразует объект даты в формат строки "дд.мм.гг"
     * @param {Date} dateObj
     */
    function formatDate(dateObj) {
        if (!(dateObj instanceof Date) || isNaN(dateObj)) {
            return 'Передан некорректный тип данных';
        }

        // Преобразуем компоненты даты в строки и добавляем нули слева через padStart
        const day = String(dateObj.getDate()).padStart(2, '0');
        const month = String(dateObj.getMonth() + 1).padStart(2, '0');
        
        // Получаем две последние цифры года с помощью метода slice
        const year = String(dateObj.getFullYear()).slice(-2);

        return `${day}.${month}.${year}`;
    }

    console.log(`Текущая дата компьютера: ${formatDate(new Date())}`);
    console.log(`Проверка архивной даты (23.04.1996): ${formatDate(new Date(new Date(1996, 4, 23)
))}`);

    </script>
</body>
</html>
